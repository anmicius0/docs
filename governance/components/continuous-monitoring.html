<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Continuous Monitoring Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "media", // Sync with system or Mintlify theme
        theme: {
          extend: {
            colors: { primary: "#ED6C00", mintDark: "#0F1117" },
            borderColor: { mint: "rgba(255, 255, 255, 0.08)" },
          },
        },
      };
    </script>
    <style>
      @keyframes shake {
        0%,
        100% {
          transform: translate(-50%, -50%) translateX(0);
        }
        25%,
        75% {
          transform: translate(-50%, -50%) translateX(-6px);
        }
        50% {
          transform: translate(-50%, -50%) translateX(6px);
        }
      }
      .shake {
        animation: shake 0.4s ease-in-out;
      }
      @keyframes pulse-ring {
        0% {
          transform: translate(-50%, -50%) scale(0.95);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }
        70% {
          transform: translate(-50%, -50%) scale(1);
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          transform: translate(-50%, -50%) scale(0.95);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }
      .alert-ring {
        animation: pulse-ring 2s infinite;
      }
      body {
        margin: 0;
        overflow: hidden;
        background-color: transparent;
      }
    </style>
  </head>
  <body
    class="w-screen h-screen font-sans text-gray-800 dark:text-gray-200 bg-white dark:bg-mintDark flex items-center justify-center"
  >
    <!-- Top Status Bar -->
    <div
      id="status-text"
      class="absolute top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-1.5 text-xs font-medium rounded-full bg-gray-50 dark:bg-black/50 border border-gray-200 dark:border-mint shadow-sm backdrop-blur-sm whitespace-nowrap transition-colors duration-300"
    >
      初始化動畫中...
    </div>

    <!-- Background Connection SVG -->
    <svg class="absolute inset-0 w-full h-full z-10 pointer-events-none">
      <line
        id="l-cloud-lc"
        x1="50%"
        y1="20%"
        x2="50%"
        y2="50%"
        stroke="currentColor"
        stroke-width="2"
        stroke-dasharray="5 5"
        class="text-gray-200 dark:text-gray-800 transition-colors duration-[525ms]"
      />
      <line
        id="l-lc-prod"
        x1="50%"
        y1="50%"
        x2="75%"
        y2="80%"
        stroke="currentColor"
        stroke-width="2"
        stroke-dasharray="5 5"
        class="text-gray-200 dark:text-gray-800 transition-colors duration-[525ms]"
      />
      <line
        id="l-lc-sec"
        x1="50%"
        y1="50%"
        x2="25%"
        y2="80%"
        stroke="currentColor"
        stroke-width="2"
        stroke-dasharray="5 5"
        class="text-gray-200 dark:text-gray-800 transition-colors duration-[525ms]"
      />
    </svg>

    <!-- Node 1: Sonatype Cloud (Top Center) -->
    <div
      id="n-cloud"
      class="absolute top-[20%] left-[50%] -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center w-36 p-3 bg-white dark:bg-gray-900/80 border border-gray-200 dark:border-mint rounded-xl shadow-sm backdrop-blur transition-colors duration-300"
    >
      <svg
        class="w-6 h-6 text-blue-500"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"
        ></path>
      </svg>
      <div class="text-xs font-semibold mt-1">Sonatype Cloud</div>
      <div
        id="cloud-tag"
        class="mt-2 px-1 py-0.5 w-full text-center text-[9px] font-mono bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-100 dark:border-red-500/20 rounded truncate opacity-0 transition-opacity duration-300"
      >
        🚨 CVE-2026-9999
      </div>
    </div>

    <!-- Node 2: Lifecycle Server (Center) -->
    <div
      id="n-lc"
      class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center w-40 p-3 bg-white dark:bg-gray-900/80 border border-gray-200 dark:border-mint rounded-xl shadow-sm backdrop-blur transition-colors duration-300"
    >
      <svg
        class="w-6 h-6 text-gray-600 dark:text-gray-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"
        ></path>
      </svg>
      <div class="text-xs font-semibold mt-1">Lifecycle Server</div>
      <div class="mt-1 text-[9px] text-gray-500 dark:text-gray-400">
        企業資安政策核心
      </div>
    </div>

    <!-- Node 3: Production Server (Bottom Right) -->
    <div
      id="n-prod"
      class="absolute top-[80%] left-[75%] -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center w-36 p-3 bg-white dark:bg-gray-900/80 border border-gray-200 dark:border-mint rounded-xl shadow-sm backdrop-blur transition-colors duration-300"
    >
      <div class="text-xs font-semibold mt-1">生產環境 (Prod)</div>
      <div
        id="prod-tag"
        class="mt-2 px-1 py-1 w-full text-center text-[9px] font-mono bg-green-50 dark:bg-green-500/10 text-green-600 dark:text-green-400 border border-green-100 dark:border-green-500/20 rounded transition-colors duration-300"
      >
        <span class="font-bold">靜態 SBOM 清單</span><br />
        log4j v2.14.0
      </div>
    </div>

    <!-- Node 4: SecOps (Bottom Left) -->
    <div
      id="n-sec"
      class="absolute top-[80%] left-[25%] -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center w-36 p-3 bg-white dark:bg-gray-900/80 border border-gray-200 dark:border-mint rounded-xl shadow-sm backdrop-blur transition-all duration-300"
    >
      <svg
        class="w-6 h-6 text-gray-500 dark:text-gray-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
        ></path>
      </svg>
      <div class="text-xs font-semibold mt-1">資安管理員</div>
      <div
        id="sec-tag"
        class="mt-2 px-1 py-0.5 w-full text-center text-[9px] font-mono bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 border border-red-100 dark:border-red-500/20 rounded truncate opacity-0 transition-opacity duration-300"
      >
        ⚠️ 應變啟動
      </div>
    </div>

    <!-- Moving Packet -->
    <div
      id="packet"
      class="absolute top-[20%] left-[50%] -translate-x-1/2 -translate-y-1/2 z-30 w-20 h-5 flex items-center justify-center text-[8px] font-mono font-bold text-white rounded shadow-md transition-all duration-[735ms] bg-gray-500 opacity-0"
    >
      DATA
    </div>

    <!-- Animation Logic -->
    <script>
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      const el = (id) => document.getElementById(id);
      const setLine = (id, color) =>
        (el(id).className = `text-${color} transition-colors duration-[525ms]`);

      async function runAnimation() {
        const packet = el("packet");
        const status = el("status-text");
        const cloudTag = el("cloud-tag");
        const prodTag = el("prod-tag");
        const nSec = el("n-sec");
        const secTag = el("sec-tag");

        while (true) {
          // --- Reset State ---
          packet.style.transition = "none";
          packet.style.opacity = "0";
          packet.style.top = "20%";
          packet.style.left = "50%";

          setLine("l-cloud-lc", "gray-200 dark:text-gray-800");
          setLine("l-lc-prod", "gray-200 dark:text-gray-800");
          setLine("l-lc-sec", "gray-200 dark:text-gray-800");

          cloudTag.style.opacity = "0";
          secTag.style.opacity = "0";
          nSec.classList.remove(
            "alert-ring",
            "shake",
            "border-red-400",
            "dark:border-red-500/50",
          );
          nSec.classList.add("border-gray-200", "dark:border-mint");

          prodTag.className =
            "mt-2 px-1 py-1 w-full text-center text-[9px] font-mono bg-green-50 dark:bg-green-500/10 text-green-600 dark:text-green-400 border border-green-100 dark:border-green-500/20 rounded transition-colors duration-300";
          prodTag.innerHTML = `<span class="font-bold">靜態 SBOM 清單</span><br/>log4j v2.14.0`;

          status.innerText = "1. 系統常態持續監控中";
          status.className =
            status.className.replace(/text-\w+-\d+/g, "") +
            " text-gray-700 dark:text-gray-300";

          await sleep(1500);

          // --- Step 1: Zero-Day in Cloud ---
          status.innerText = "2. 全球情資中心發現零時差漏洞";
          status.className = status.className.replace(
            "text-gray-700 dark:text-gray-300",
            "text-red-600 dark:text-red-400",
          );
          cloudTag.style.opacity = "1";
          await sleep(1200);

          // --- Step 2: Sync to Lifecycle ---
          status.innerText = "3. 威脅情資即時同步至 Lifecycle";
          packet.style.transition = "all 0.7s ease-in-out";
          packet.style.opacity = "1";
          packet.innerText = "THREAT SYNC";
          packet.className = packet.className.replace(
            "bg-gray-500",
            "bg-red-500",
          );

          packet.style.top = "50%";
          setLine("l-cloud-lc", "red-400");
          await sleep(1000);

          // --- Step 3: Check Prod SBOM ---
          status.innerText = "4. 自動比對生產環境的靜態 SBOM";
          status.className = status.className.replace(
            "text-red-600 dark:text-red-400",
            "text-primary",
          );
          packet.innerText = "CHECK SBOM";
          packet.className = packet.className.replace(
            "bg-red-500",
            "bg-primary",
          );

          packet.style.top = "80%";
          packet.style.left = "75%";
          setLine("l-lc-prod", "primary");
          await sleep(1000);

          // --- Step 4: Vulnerability Matched ---
          status.innerText = "5. 發現命中！生產環境包含受影響套件";
          status.className = status.className.replace(
            "text-primary",
            "text-red-600 dark:text-red-400",
          );
          packet.style.opacity = "0"; // hide briefly

          prodTag.className = prodTag.className
            .replace("bg-green-50", "bg-red-50")
            .replace("text-green-600", "text-red-600")
            .replace("border-green-100", "border-red-100")
            .replace("dark:bg-green-500/10", "dark:bg-red-500/10")
            .replace("dark:text-green-400", "dark:text-red-400")
            .replace("dark:border-green-500/20", "dark:border-red-500/20");
          prodTag.innerHTML = `<span class="font-bold">⚠️ 漏洞命中</span><br/>log4j v2.14.0`;
          await sleep(1200);

          // --- Step 5: Route to SecOps ---
          status.innerText = "6. 即時發送警報予資安團隊";
          packet.style.transition = "none";
          packet.style.top = "50%"; // Reset to Lifecycle instantly
          packet.style.left = "50%";
          packet.className = packet.className.replace(
            "bg-primary",
            "bg-red-500",
          );
          packet.innerText = "ALERT!";

          await sleep(50);
          packet.style.transition = "all 0.7s ease-in-out";
          packet.style.opacity = "1";
          packet.style.top = "80%";
          packet.style.left = "25%";
          setLine("l-lc-sec", "red-500");
          await sleep(800);

          // --- Step 6: Alert Triggered ---
          packet.style.opacity = "0";
          secTag.style.opacity = "1";
          nSec.classList.remove("border-gray-200", "dark:border-mint");
          nSec.classList.add(
            "border-red-400",
            "dark:border-red-500/50",
            "alert-ring",
            "shake",
          );

          await sleep(3500); // Hold final state before reset
        }
      }

      setTimeout(runAnimation, 600);
    </script>
  </body>
</html>
